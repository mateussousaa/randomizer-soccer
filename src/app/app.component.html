<div class="h-screen font-primary">
  <header class="flex h-1/6 bg-neutral-800 justify-center items-center">
    <h1 class="text-lime-500 font-bold text-3xl">RandomizerSoccer</h1>
  </header>
  <section class="flex h-5/6 justify-around">
    <div class="left-side bg-slate-200 w-2/6 p-16">
      <h3 class="text-center p-4 text-lime-500 font-semibold text-xl">Player 1</h3>
      <app-team-card
        [teamData]="firstTeam"
      ></app-team-card>
    </div>
    <div class="center flex flex-col justify-end">
      <button
        class="py-3 px-12 bg-neutral-800 text-white font-semibold rounded-md mb-32"
        (click)="randomTeams()"
      >
        Go
      </button>
    </div>
    <div class="right-side bg-slate-200 w-2/6 p-16">
      <h3 class="text-center p-4 text-lime-500 font-semibold text-xl">Player 2</h3>
      <app-team-card
        [teamData]="secondTeam"
      ></app-team-card>
    </div>
  </section>
</div>
